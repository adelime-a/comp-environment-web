




<!DOCTYPE html>
<html>
<head>
    <title>Lab Regulations & School Policies</title>

    <style>
        .head {
            min-height: 100vh;

            display: flex;
            flex-direction: column;
            justify-content: center;  

            font-family: Arial;

            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.35)),
                url("visuals/computer_recycle.webp");
            background-size: cover;
            background-repeat: no-repeat;
        }

        #h1 {
            font-weight: bold;
            color:rgb(175, 226, 201);
            font-size: 80px;
            text-align: center;
        }

        #subtitle {
            margin-top: -35px;
            color:rgb(175, 226, 201);
            font-size: 30px;
            text-align: center;
        }
    </style>
</head>

<body>
    <section class="head">
        <p id="h1">Computer Recycling & Reuse</p>
        <p id="subtitle">Subtitle</p>
    </section>
    
</body>
<script>
    window.addEventListener("scroll", function() {

        let scroll = window.scrollY;

        let hero = document.querySelector(".head");

        let opacity = 1 - scroll / 700;

        if (opacity < 0) {
            opacity = 0;
        }

        hero.style.opacity = opacity;

        hero.style.transform =
            `scale(${1 - scroll * 0.0002})`;
    });
</script>
</html>
